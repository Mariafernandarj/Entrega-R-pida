<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RepártoYa{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Static CSS -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  {% block extra_css %}{% endblock %}

  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:          #0d0d0d;
      --surface:     #161616;
      --surface-2:   #1f1f1f;
      --border:      rgba(255,255,255,0.07);
      --accent:      #ff5c1a;
      --accent-2:    #ffb547;
      --text:        #f0ece4;
      --text-muted:  #6b6761;
      --success:     #2ecc71;
      --warning:     #f39c12;
      --danger:      #e74c3c;
      --info:        #3498db;
      --radius:      12px;
      --radius-lg:   20px;
      --sidebar-w:   260px;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --transition:   0.2s cubic-bezier(.4,0,.2,1);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform var(--transition);
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark .dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: background var(--transition), color var(--transition);
      margin-bottom: 2px;
      position: relative;
    }

    .nav-item:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(255, 92, 26, 0.12);
      color: var(--accent);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 3px;
      background: var(--accent);
      border-radius: 0 4px 4px 0;
    }

    .nav-icon {
      width: 18px; height: 18px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      line-height: 1.4;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      transition: background var(--transition);
    }

    .user-card:hover { background: var(--surface-2); }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name  { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role  { font-size: 11px; color: var(--text-muted); }

    /* ── Main Content ── */
    .main-wrapper {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Topbar ── */
    .topbar {
      height: 64px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    .topbar-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      flex: 1;
    }

    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255,92,26,0.3);
    }

    .btn-primary:hover {
      background: #e8501a;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,92,26,0.4);
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: #2a2a2a; }

    .btn-danger {
      background: rgba(231,76,60,0.12);
      color: var(--danger);
      border: 1px solid rgba(231,76,60,0.25);
    }

    .btn-danger:hover { background: rgba(231,76,60,0.2); }

    .icon-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .icon-btn:hover { color: var(--text); background: #2a2a2a; }

    /* ── Page Content ── */
    .page-content {
      flex: 1;
      padding: 36px 32px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Messages / Alerts ── */
    .messages-container {
      padding: 0 32px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .alert {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      animation: slideIn 0.3s ease both;
      position: relative;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .alert-success { background: rgba(46,204,113,0.1);  border: 1px solid rgba(46,204,113,0.25);  color: var(--success); }
    .alert-error,
    .alert-danger  { background: rgba(231,76,60,0.1);   border: 1px solid rgba(231,76,60,0.25);   color: var(--danger); }
    .alert-warning { background: rgba(243,156,18,0.1);  border: 1px solid rgba(243,156,18,0.25);  color: var(--warning); }
    .alert-info    { background: rgba(52,152,219,0.1);  border: 1px solid rgba(52,152,219,0.25);  color: var(--info); }

    .alert-close {
      margin-left: auto;
      opacity: 0.6;
      font-size: 18px;
      line-height: 1;
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 0 4px;
    }
    .alert-close:hover { opacity: 1; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
    }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td { padding: 14px 16px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-pendiente { background: rgba(243,156,18,0.15); color: var(--warning); }
    .badge-asignado  { background: rgba(52,152,219,0.15);  color: var(--info); }
    .badge-en_camino { background: rgba(155,89,182,0.15);  color: #a78bfa; }
    .badge-entregado { background: rgba(46,204,113,0.15);  color: var(--success); }
    .badge-cancelado { background: rgba(231,76,60,0.15);   color: var(--danger); }

    /* ── Forms ── */
    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,92,26,0.12);
    }

    select option { background: var(--surface-2); }

    /* ── Hamburger (mobile) ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 38px; height: 38px;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .hamburger span {
      display: block;
      width: 18px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all var(--transition);
    }

    /* ── Mobile overlay ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      backdrop-filter: blur(2px);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.open { display: block; }

      .main-wrapper { margin-left: 0; }

      .topbar { padding: 0 20px; }
      .page-content { padding: 24px 20px; }
      .messages-container { padding: 0 20px; }
      .hamburger { display: flex; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p { font-size: 14px; }
  </style>
</head>

<body>
<nav>
  <a href="{% url 'solicitudes_de_reparto' %}">Inicio</a>
  <a href="{% url 'ver_pedidos' %}">Mis pedidos</a>
</nav>

<hr>

{% if messages %}
  {% for message in messages %}
    <p>{{ message }}</p>
  {% endfor %}
{% endif %}

{% block content %}
{% endblock %}

</body>
</html>
