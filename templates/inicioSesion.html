{% extends "base.html" %}

{% block title %}Iniciar Sesión - RepártoYa{% endblock %}

{% block content %}
<div class="layout" style="justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 400px; margin: 0 auto; margin-top: 50px;">
        <div class="card-header" style="justify-content: center; text-align: center;">
            <h2 class="card-title" style="font-size: 24px;">¡Inicia tu sesión!</h2>
        </div>
        
        <!-- se muestran los errores si la contraseña es erronea -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-error">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'iniciar_sesion' %}">
            {% csrf_token %}
            <div class="form-group">
                <label style="text-align: center;">USUARIO</label>
                <input type="text" name="usuario" required>
            </div>
            
            <div class="form-group">
                <label style="text-align: center;">CONTRASEÑA</label>
                <input type="password" name="contrasena" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 20px;">
                Entrar
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 30px;">
            <p style="color: var(--text-muted); font-size: 13px;">¿Aún no tienes cuenta?</p>
            <a href="{% url 'seleccionar_tipo' %}" class="btn btn-ghost" style="width: 100%; justify-content: center; margin-top: 10px;">
                ¡Regístrate!
            </a>
        </div>
    </div>
</div>
{% endblock %}
