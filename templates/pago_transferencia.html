{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="/static/css/navegar_menus.css">

<div class="topbar">
    <div class="logo">😊</div>
    <div class="busqueda">
        <form method="GET" action="{% url 'busqueda_platillo' %}" style="width: 100%; display: flex;">
            <input type="text" name="q" placeholder="Busca comida o restaurantes y presiona Enter">
        </form>
    </div>
    <div class="topbar-icons">
        <div class="user-menu-wrapper">
            <span id="userIcon" onclick="toggleMenu()" style="cursor:pointer;">👤</span>
            <div class="user-dropdown" id="userDropdown">
                <a href="{% url 'editar_cliente' %}">Editar Datos</a>
                <a href="{% url 'cerrar_sesion' %}" class="cerrar-sesion">Cerrar Sesión</a>
            </div>
        </div>
        <span>🛒</span>
    </div>
</div>

<div style="background-color: #111111; color: #ffffff; min-height: 80vh; padding: 100px 20px 40px 20px; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center;">
    
    <div style="background-color: #1c1c1c; width: 100%; max-width: 600px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); padding: 40px 30px; position: relative;">
        
        <h2 style="text-align: center; color: #ffffff; margin-bottom: 30px; font-weight: normal; font-size: 28px;">
            Pago por transferencia
        </h2>

        <p style="font-size: 18px; margin-bottom: 30px;">
            Cargo: <strong style="color: #ff6600;">{{ pedido.platillo.nombre|default:"Cargando platillo..." }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}
            
            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px;">
                
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="width: 45%;">CLABE interbancaria/Núm cta:</label>
                    <input type="text" maxlength="18" oninput="soloNumeros(this)" placeholder="18 dígitos..." style="width: 50%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white;">
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="width: 45%;">Nombre del Titular:</label>
                    <input type="text" oninput="formatearNombre(this)" placeholder="NOMBRE..." style="width: 50%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white;">
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
                    <label style="width: 45%; color: #aaa;">Importe:</label>
                    <input type="text" value="${{ pedido.total|default:'0.00' }}" readonly style="width: 50%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #ff6600; font-weight: bold; cursor: not-allowed;">
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="width: 45%; color: #aaa;">Concepto de Pago:</label>
                    <input type="text" value="Pago de {{ pedido.platillo.nombre|default:'pedido' }}" readonly style="width: 50%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #aaa; cursor: not-allowed;">
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="width: 45%; color: #aaa;">Banco destino:</label>
                    <input type="text" value="Banco Entrega Rápida" readonly style="width: 50%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #aaa; cursor: not-allowed;">
                </div>
            </div>

            <div style="display: flex; justify-content: center; gap: 20px;">
                <a href="{% url 'pago_producto' %}" style="background-color: transparent; border: 1px solid #ff6600; color: #ff6600; padding: 12px 30px; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold; width: 40%;">Cancelar</a>
                <button type="submit" style="background-color: #ff6600; color: white; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 40%;">Aceptar</button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleMenu() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    function soloNumeros(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    function formatearNombre(input) {
        let texto = input.value;
        texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
        texto = texto.replace(/[^a-zA-Z\s]/g, ""); 
        input.value = texto.toUpperCase(); 
    }
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
</script>
{% endblock %}
