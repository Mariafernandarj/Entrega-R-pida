{% extends 'base.html' %}
{% block content %}
<div style="background-color: #111111; color: #ffffff; min-height: 80vh; padding: 40px 20px; font-family: Arial, sans-serif;">
    
    <div style="background-color: #1c1c1c; padding: 30px; border: 1px solid #333; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        
        <div style="text-align: center; font-size: 50px; margin-bottom: 20px;">🍽️</div>
        
        <h2 style="margin-top: 0; color: #ffffff; text-align: center;">{{ platillo.nombre }}</h2>
        <p style="font-size: 24px; color: #ff6600; text-align: center; font-weight: bold; margin: 10px 0;">${{ platillo.precio }}</p>
        
        <p style="color: #aaaaaa; text-align: center; margin-bottom: 30px;">{{ platillo.descripcion|default:"Delicioso platillo preparado al momento con los mejores ingredientes." }}</p>
        
        <div style="display: flex; justify-content: center; gap: 15px;">
            <form method="POST" action="{% url 'adquirir_ahora' platillo.id %}" style="margin: 0;">
                {% csrf_token %}
                <button type="submit" style="background-color: #ff6600; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s;">
                    ¡Adquirir ahora!
                </button>
            </form>

            <!-- CAMBIO: ahora llama a agregar_producto_carrito con el id del platillo -->
            <a href="{% url 'agregar_producto_carrito' platillo.id %}" style="padding: 12px 24px; background-color: transparent; color: #ff6600; border: 1px solid #ff6600; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 14px; text-align: center;">
                Agregar al 🛒
            </a>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="javascript:history.back()" style="color: #888; text-decoration: none; font-size: 14px;">← Regresar a los resultados</a>
        </div>
    </div>
</div>
{% endblock %}
